<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Laporan Mixing - Tiger Mandiri</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --cream: #FAF8F4;
            --amber: #C2550A;
            --amber-dark: #8B3A06;
            --amber-light: #E8874A;
            --charcoal: #1C1814;
            --sage: #4A6741;
            --gold: #C8961E;
            --sand: #D4B896;
            --warm-gray: #E8E2D9;
            --warm-gray-2: #D5CCBF;
            --text-muted: #8A7E72;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--charcoal);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        .wrapper { max-width: 780px; margin: 0 auto; position: relative; z-index: 1; }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            border: 1.5px solid var(--sand);
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 1.75rem;
        }
        .btn-back:hover { border-color: var(--amber); color: var(--amber); }

        .main-card {
            background: white;
            border: 1px solid var(--warm-gray);
            border-top: 4px solid var(--amber);
            padding: 2rem 2.5rem;
            animation: fadeUp 0.4s ease both;
        }

        .card-header {
            border-bottom: 1px solid var(--warm-gray);
            padding-bottom: 1.25rem;
            margin-bottom: 2rem;
        }
        .card-header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.75rem;
            color: var(--charcoal);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header h2 i { color: var(--amber); font-size: 1.3rem; }
        .card-header p { color: var(--text-muted); font-size: 0.83rem; margin-top: 4px; }

        /* Section headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            margin-bottom: 1rem;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .section-header.amber { background: #FDF0E8; border-left: 4px solid var(--amber); color: var(--amber-dark); }
        .section-header.gold  { background: #FFFBEA; border-left: 4px solid var(--gold); color: #7A6200; }

        .form-section { margin-bottom: 1.75rem; }

        /* Grid layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .grid-1 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (max-width: 600px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label {
            font-size: 0.69rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--warm-gray-2);
            background: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--charcoal);
            transition: all 0.2s;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: var(--amber);
            border-left-width: 4px;
            box-shadow: 0 2px 6px rgba(194, 85, 10, 0.1);
        }
        textarea { resize: vertical; }

        /* Input states */
        .input-manual { border-left: 3px solid var(--sage); }
        .input-teknis { border-left: 3px solid var(--gold); }
        .input-auto {
            background: var(--cream);
            color: var(--text-muted);
            font-weight: 700;
            cursor: not-allowed;
            border-left: 3px solid var(--warm-gray-2);
        }
        .input-highlight { border: 2px solid var(--amber); }

        /* Request box */
        .request-box {
            background: var(--cream);
            border: 1px solid var(--warm-gray-2);
            padding: 1rem 1.25rem;
            margin-top: 0.75rem;
        }

        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 10px 14px;
            background: var(--cream);
            border: 1px solid var(--warm-gray);
            margin-bottom: 1.5rem;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* Generate button */
        .btn-generate {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--amber);
            color: white;
            border: none;
            padding: 14px 24px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }
        .btn-generate:hover { background: var(--amber-dark); }
        .btn-note {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-style: italic;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <a href="index.html" class="btn-back"><i class="fas fa-home"></i> Dashboard</a>

    <div class="main-card">

        <div class="card-header">
            <h2><i class="fas fa-flask"></i> Generator Laporan Mixing</h2>
            <p>Input Data Real (DKBT & Bahan Terpakai)</p>
        </div>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--sage)"></div> Input Manual</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div> Data Teknis</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--warm-gray-2)"></div> Otomatis</div>
        </div>

        <form id="prodForm">

            <!-- A. Identitas Produk -->
            <div class="form-section">
                <div class="section-header amber"><i class="fas fa-tag"></i> A. Identitas Produk</div>
                <div class="grid-1">
                    <div class="field">
                        <label>Nama Produk</label>
                        <input type="text" id="namaProduk" placeholder="Contoh: PT 208 Inner Lid..." class="input-manual">
                    </div>
                </div>
            </div>

            <!-- B. Data Produksi -->
            <div class="form-section">
                <div class="section-header amber"><i class="fas fa-industry"></i> B. Data Produksi</div>
                <div class="grid-2">
                    <div class="field">
                        <label>Jumlah WO (Pcs)</label>
                        <input type="number" id="jumlahWO" placeholder="0" oninput="hitung()" class="input-manual">
                    </div>
                    <div class="field">
                        <label>Kekurangan (Pcs)</label>
                        <input type="number" id="kekurangan" placeholder="0" oninput="hitung()" class="input-manual">
                    </div>
                </div>
                <div class="grid-1" style="margin-top:0.75rem">
                    <div class="field">
                        <label>Total Produksi (Otomatis)</label>
                        <input type="text" id="totalProduksi" readonly class="input-auto" placeholder="0">
                    </div>
                </div>
            </div>

            <!-- C. Data Teknis Mesin -->
            <div class="form-section">
                <div class="section-header gold"><i class="fas fa-cogs"></i> C. Data Teknis Mesin</div>
                <div class="grid-3">
                    <div class="field">
                        <label>Total Cavity</label>
                        <input type="number" id="totalCavity" placeholder="0" class="input-teknis">
                    </div>
                    <div class="field">
                        <label>Cavity OK</label>
                        <input type="number" id="cavityOk" placeholder="0" oninput="hitung()" class="input-teknis">
                    </div>
                    <div class="field">
                        <label>Berat Shoot (Gr)</label>
                        <input type="number" id="beratShoot" placeholder="0.00" step="0.01" oninput="hitung()" class="input-teknis">
                    </div>
                </div>
            </div>

            <!-- D. Material & Request -->
            <div class="form-section">
                <div class="section-header amber"><i class="fas fa-box"></i> D. Material & Request</div>
                <div class="grid-2">
                    <div class="field">
                        <label>DKBT Hitungan (Kg)</label>
                        <input type="text" id="kebutuhanDKBT" readonly class="input-auto" placeholder="0">
                    </div>
                    <div class="field">
                        <label>Bahan Terpakai (Kg)</label>
                        <input type="text" id="bahanTerpakai" readonly class="input-auto" placeholder="0">
                    </div>
                </div>
                <div class="request-box">
                    <div class="grid-2">
                        <div class="field">
                            <label style="color:var(--amber)">Request / Dibulatkan (Kg)</label>
                            <input type="number" id="requestKg" placeholder="0" class="input-highlight">
                        </div>
                        <div class="field">
                            <label>Jatah Mixing (Kg)</label>
                            <input type="number" id="jatahMixing" placeholder="0" class="input-manual">
                        </div>
                    </div>
                </div>
            </div>

            <!-- E. Keterangan -->
            <div class="form-section">
                <div class="section-header amber"><i class="fas fa-sticky-note"></i> E. Keterangan Tambahan</div>
                <div class="grid-1" style="gap:0.75rem">
                    <div class="field">
                        <label>Isi Kolom Balokan (Teks)</label>
                        <input type="text" id="balokan" placeholder="-" class="input-manual">
                    </div>
                    <div class="field">
                        <label>Alasan Penambahan</label>
                        <textarea id="alasan" rows="2" placeholder="Contoh: Banyak reject bintik..." class="input-manual"></textarea>
                    </div>
                </div>
            </div>

            <!-- Generate Button -->
            <button type="button" onclick="generateWord()" class="btn-generate">
                <i class="fas fa-file-word"></i> Generate Word (Siap Print)
            </button>
            <p class="btn-note">*Pastikan kode logo Base64 sudah terpasang di source code agar logo muncul.</p>

        </form>
    </div>
</div>

    <!-- LOGIC SCRIPT (ASLI 100% DARI FILE LAMA) -->
    <script>
        function hitung() {
            let wo = parseFloat(document.getElementById('jumlahWO').value) || 0;
            let kurang = parseFloat(document.getElementById('kekurangan').value) || 0;
            let cavOk = parseFloat(document.getElementById('cavityOk').value) || 0;
            let berat = parseFloat(document.getElementById('beratShoot').value) || 0;

            // 1. Total Produksi
            let prod = wo - kurang;
            document.getElementById('totalProduksi').value = (wo > 0 && kurang > 0) ? prod.toLocaleString('id-ID') : "0";

            // 2. Kebutuhan DKBT
            let dkbt = 0;
            if (cavOk > 0 && kurang > 0 && berat > 0) dkbt = (kurang / cavOk) * berat / 1000;
            document.getElementById('kebutuhanDKBT').value = dkbt.toLocaleString('id-ID', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            // 3. Bahan Terpakai
            let terpakai = 0;
            if (cavOk > 0 && prod > 0 && berat > 0) terpakai = (prod / cavOk) * berat / 1000;
            document.getElementById('bahanTerpakai').value = terpakai.toLocaleString('id-ID', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
